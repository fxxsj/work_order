name: Release (Android)

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. android-v1.2.3). If empty, uses current ref.'
        required: false

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Validate tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          node scripts/release/validate-tag.mjs android "$TAG"

      - name: Generate Android project (Capacitor)
        run: |
          cd apps/mobile
          npm run cap:add:android

      - name: Build web + sync into Android
        run: npm run android:build

      - name: Build APK/AAB (release, unsigned)
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Collect unsigned outputs
        run: |
          mkdir -p dist
          cp apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk dist/app-release-unsigned.apk
          cp apps/mobile/android/app/build/outputs/bundle/release/app-release.aab dist/app-release-unsigned.aab

      - name: Sign APK (optional, if secrets are set)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

          BUILD_TOOLS_VERSION="$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)"
          ZIPALIGN="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION/zipalign"
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION/apksigner"

          "$ZIPALIGN" -v -p 4 dist/app-release-unsigned.apk dist/app-release-aligned.apk
          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/release.keystore" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out dist/app-release-signed.apk \
            dist/app-release-aligned.apk
          "$APKSIGNER" verify --verbose dist/app-release-signed.apk

          cp dist/app-release-unsigned.aab dist/app-release-signed.aab
          jarsigner -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            dist/app-release-signed.aab \
            "$ANDROID_KEY_ALIAS"
          jarsigner -verify -verbose dist/app-release-signed.aab

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/

      - name: Upload to Google Play (optional)
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' && secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.workorder.app
          releaseFiles: dist/app-release-signed.aab
          track: internal
          status: completed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
