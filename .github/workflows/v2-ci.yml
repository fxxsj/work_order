name: V2 CI

on:
  push:
    branches: [ main, develop, local-dev ]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [ main, develop, local-dev ]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"

jobs:
  v2-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@10.4.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
