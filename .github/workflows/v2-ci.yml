name: V2 CI

on:
  push:
    branches: [ main, develop, local-dev ]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [ main, develop, local-dev ]
    paths:
      - "apps/**"
      - "packages/**"
      - "infra/**"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - "package-lock.json"

jobs:
  v2-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
