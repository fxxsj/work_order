name: Release (Desktop)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.2.3). If empty, uses current ref.'
        required: false

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false

  build-desktop:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Apply version from tag
        shell: bash
        env:
          TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          node scripts/release/validate-tag.mjs desktop "$TAG"
          node scripts/release/apply-version.mjs "$TAG"

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run desktop:build

      - name: Package bundles (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          mkdir -p dist/bundles
          ditto -c -k --sequesterRsrc --keepParent apps/desktop/src-tauri/target/release/bundle "dist/bundles/WorkOrder-${TAG}-macos.zip"

      - name: Package bundles (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          New-Item -ItemType Directory -Force -Path dist/bundles | Out-Null
          $src = "apps/desktop/src-tauri/target/release/bundle"
          $dst = "dist/bundles/WorkOrder-$tag-windows.zip"
          if (Test-Path $dst) { Remove-Item $dst -Force }
          Compress-Archive -Path "$src/*" -DestinationPath $dst

      - name: Collect updater assets (macOS)
        if: ${{ runner.os == 'macOS' && secrets.TAURI_PRIVATE_KEY != '' && secrets.TAURI_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            PLATFORM="darwin-aarch64"
          else
            PLATFORM="darwin-x86_64"
          fi
          node scripts/release/collect-tauri-updater-assets.mjs --tag "$TAG" --platform "$PLATFORM"

      - name: Collect updater assets (Windows)
        if: ${{ runner.os == 'Windows' && secrets.TAURI_PRIVATE_KEY != '' && secrets.TAURI_KEY_PASSWORD != '' }}
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          node scripts/release/collect-tauri-updater-assets.mjs --tag "$tag" --platform "windows-x86_64"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundles-${{ matrix.os }}
          path: dist/bundles/*.zip

      - name: Upload updater artifacts
        if: ${{ secrets.TAURI_PRIVATE_KEY != '' && secrets.TAURI_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tauri-updater-${{ matrix.os }}
          path: dist/tauri-updater/*

  publish-bundles:
    name: Publish desktop bundles
    runs-on: ubuntu-latest
    needs: [build-desktop]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload bundles to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/**/WorkOrder-*.zip

  publish-updater:
    name: Publish updater assets
    runs-on: ubuntu-latest
    needs: [build-desktop]
    if: ${{ secrets.TAURI_PRIVATE_KEY != '' && secrets.TAURI_KEY_PASSWORD != '' && secrets.TAURI_PUBLIC_KEY != '' }}
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="${{ github.repository }}"

          mkdir -p dist/out
          PLATFORMS_JSON="{}"

          while IFS= read -r meta; do
            PLATFORM="$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).platform)" "$meta")"
            ASSET="$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).asset)" "$meta")"
            SIG="$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).signature)" "$meta")"
            URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
            PLATFORMS_JSON="$(node -e "const p=JSON.parse(process.argv[1]); p[process.argv[2]]={url:process.argv[3],signature:process.argv[4]}; console.log(JSON.stringify(p));" "$PLATFORMS_JSON" "$PLATFORM" "$URL" "$SIG")"
          done < <(find dist -type f -name "workorder-${TAG}-*.json" -print)

          node -e "const fs=require('fs'); const platforms=JSON.parse(process.argv[1]); const out={version:process.argv[2],notes:'',pub_date:process.argv[3],platforms}; fs.writeFileSync('dist/out/latest.json', JSON.stringify(out,null,2)+'\n');" "$PLATFORMS_JSON" "$VERSION" "$PUB_DATE"
          echo "latest.json generated:"
          cat dist/out/latest.json

      - name: Collect assets for upload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/upload
          find dist -maxdepth 6 -type f \( -name "*.sig" -o -name "workorder-${{ inputs.tag || github.ref_name }}-*" \) -print0 | xargs -0 -I{} cp "{}" dist/upload/ || true
          cp dist/out/latest.json dist/upload/latest.json
          ls -la dist/upload

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/upload/*
