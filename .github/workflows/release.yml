name: Release (Desktop + Web)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.2.3). If empty, uses current ref.'
        required: false

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Validate tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          node scripts/release/validate-tag.mjs desktop "$TAG"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false

  build-web:
    name: Build web dist (vNext)
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup linux binary (workaround)
        shell: bash
        run: |
          set -euo pipefail
          ROLLUP_VERSION="$(node -e "console.log(require('rollup/package.json').version)")"
          npm i --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"

      - name: Validate tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          node scripts/release/validate-tag.mjs desktop "$TAG"

      - name: Build apps/web (hash routing)
        run: npm run web:build:hash

      - name: Package web dist
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          mkdir -p dist/web
          cd apps/web/dist
          zip -r "../../../dist/web/WorkOrder-${TAG}-web.zip" .

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.event.inputs.tag || github.ref_name }}
          path: dist/web/WorkOrder-*-web.zip

      - name: Upload web dist to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/web/WorkOrder-*-web.zip
          fail_on_unmatched_files: true

  build-desktop:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [create-release]
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows bundler tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis -y
          choco install wixtoolset -y

      - name: Install dependencies
        run: npm ci

      - name: Apply version from tag
        shell: bash
        env:
          TAURI_PUBLIC_KEY: ${{ env.TAURI_PUBLIC_KEY }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          node scripts/release/validate-tag.mjs desktop "$TAG"
          node scripts/release/apply-version.mjs "$TAG"

      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ env.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ env.TAURI_KEY_PASSWORD }}
        run: npm run desktop:build

      - name: Collect installers (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            PLATFORM="darwin-aarch64"
          else
            PLATFORM="darwin-x86_64"
          fi
          node scripts/release/collect-tauri-installers.mjs --tag "$TAG" --platform "$PLATFORM"

      - name: Collect installers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          node scripts/release/collect-tauri-installers.mjs --tag "$tag" --platform "windows-x86_64"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installers-${{ matrix.os }}
          path: dist/installers/*

      - name: Package bundles (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          mkdir -p dist/bundles
          BUNDLE_ROOT="$(node scripts/release/print-tauri-bundle-root.mjs)"
          ditto -c -k --sequesterRsrc --keepParent "$BUNDLE_ROOT" "dist/bundles/WorkOrder-${TAG}-macos.zip"

      - name: Package bundles (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          New-Item -ItemType Directory -Force -Path dist/bundles | Out-Null
          $src = node scripts/release/print-tauri-bundle-root.mjs
          $dst = "dist/bundles/WorkOrder-$tag-windows.zip"
          if (Test-Path $dst) { Remove-Item $dst -Force }
          Compress-Archive -Path "$src/*" -DestinationPath $dst

      - name: Collect updater assets (macOS)
        if: ${{ runner.os == 'macOS' && env.TAURI_PRIVATE_KEY != '' && env.TAURI_KEY_PASSWORD != '' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            PLATFORM="darwin-aarch64"
          else
            PLATFORM="darwin-x86_64"
          fi
          node scripts/release/collect-tauri-updater-assets.mjs --tag "$TAG" --platform "$PLATFORM"

      - name: Collect updater assets (Windows)
        if: ${{ runner.os == 'Windows' && env.TAURI_PRIVATE_KEY != '' && env.TAURI_KEY_PASSWORD != '' }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          node scripts/release/collect-tauri-updater-assets.mjs --tag "$tag" --platform "windows-x86_64"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundles-${{ matrix.os }}
          path: dist/bundles/*.zip

      - name: Upload updater artifacts
        if: ${{ env.TAURI_PRIVATE_KEY != '' && env.TAURI_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tauri-updater-${{ matrix.os }}
          path: dist/tauri-updater/*

  publish-bundles:
    name: Publish desktop bundles
    runs-on: ubuntu-latest
    needs: [build-desktop]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload bundles to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/**/WorkOrder-*.zip
          fail_on_unmatched_files: false

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/**/WorkOrder-*.dmg
          fail_on_unmatched_files: false

      - name: Upload Windows installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/**/WorkOrder-*.msi
            dist/**/WorkOrder-*.exe
          fail_on_unmatched_files: false

  publish-updater:
    name: Publish updater assets
    runs-on: ubuntu-latest
    needs: [build-desktop]
    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      TAURI_PUBLIC_KEY: ${{ secrets.TAURI_PUBLIC_KEY }}
    steps:
      - name: Gate updater publishing
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${TAURI_PRIVATE_KEY:-}" ] && [ -n "${TAURI_KEY_PASSWORD:-}" ] && [ -n "${TAURI_PUBLIC_KEY:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download artifacts
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate latest.json
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO="${{ github.repository }}"

          mkdir -p dist/out
          PLATFORMS_JSON="{}"

          while IFS= read -r meta; do
            PLATFORM="$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).platform)" "$meta")"
            ASSET="$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).asset)" "$meta")"
            SIG="$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).signature)" "$meta")"
            URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
            PLATFORMS_JSON="$(node -e "const p=JSON.parse(process.argv[1]); p[process.argv[2]]={url:process.argv[3],signature:process.argv[4]}; console.log(JSON.stringify(p));" "$PLATFORMS_JSON" "$PLATFORM" "$URL" "$SIG")"
          done < <(find dist -type f -name "workorder-${TAG}-*.json" -print)

          node -e "const fs=require('fs'); const platforms=JSON.parse(process.argv[1]); const out={version:process.argv[2],notes:'',pub_date:process.argv[3],platforms}; fs.writeFileSync('dist/out/latest.json', JSON.stringify(out,null,2)+'\n');" "$PLATFORMS_JSON" "$VERSION" "$PUB_DATE"
          echo "latest.json generated:"
          cat dist/out/latest.json

      - name: Collect assets for upload
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/upload
          find dist -maxdepth 6 -type f \( -name "*.sig" -o -name "workorder-${{ github.event.inputs.tag || github.ref_name }}-*" \) -print0 | xargs -0 -I{} cp "{}" dist/upload/ || true
          cp dist/out/latest.json dist/upload/latest.json
          ls -la dist/upload

      - name: Upload assets to release
        if: ${{ steps.gate.outputs.enabled == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/upload/*
          fail_on_unmatched_files: false
