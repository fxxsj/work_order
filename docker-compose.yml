services:
  db:
    image: postgres:13
    container_name: workorder_db
    environment:
      POSTGRES_DB: workorder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    container_name: workorder_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workorder_backend
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DATABASE_URL=postgres://postgres:postgres123@db:5432/workorder
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - CREATE_SUPERUSER=True
      - SUPERUSER_USERNAME=admin
      - SUPERUSER_EMAIL=admin@example.com
      - SUPERUSER_PASSWORD=admin123456
      - LOAD_INITIAL_DATA=True
      - ENABLE_PERFORMANCE_MONITORING=True
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
      - log_files:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # Web vNext dev server (optional)
  web:
    image: node:18-alpine
    container_name: workorder_web
    working_dir: /app
    environment:
      - VITE_API_BASE_URL=http://backend:8000/api
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run web:dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    profiles:
      - development

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
  log_files:

networks:
  default:
    name: workorder_network
