version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workorder_backend
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-dev-key-for-testing-only
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:8080
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Frontend service
  frontend:
    image: node:20-alpine
    container_name: workorder_frontend
    working_dir: /app
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run serve -- --host 0.0.0.0"
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: workorder_network
